  #             echo "Failed to publish horizon-ui after waiting for horizon-core to sync on crates.io."
  #             exit 1
  #           fi
  #           sleep $((attempt * 5))
  #         done

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - version
      - maintainability
      - clippy
      - clippy-strict
      - rust-test
      - rust-artifacts
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Package release assets
        run: |
          cd artifacts
          tar czf ../horizon-linux-x64.tar.gz -C linux-x64 .
          tar czf ../horizon-osx-x64.tar.gz -C osx-x64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.semver }}
          name: v${{ needs.version.outputs.semver }}
          draft: ${{ github.ref == 'refs/heads/main' }}
          prerelease: ${{ github.ref == 'refs/heads/develop' }}
          generate_release_notes: true
          files: |
            horizon-linux-x64.tar.gz
            horizon-osx-x64.tar.gz
