name: CI

on:
  push:
    branches: [main, 'release/*']
    tags: ['v*']
  pull_request:
    branches: [main, 'release/*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.gitversion.outputs.semVer }}
      major: ${{ steps.gitversion.outputs.major }}
      minor: ${{ steps.gitversion.outputs.minor }}
      patch: ${{ steps.gitversion.outputs.patch }}
      prerelease: ${{ steps.gitversion.outputs.preReleaseLabel }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true
      - name: Verify GitVersion and Cargo baseline versions are aligned
        run: ./scripts/check-version-sync.sh
      - uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: '6.x'
      - id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - run: rustup component add rustfmt
      - run: cargo fmt --all -- --check

  maintainability:
    name: Maintainability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - run: ./scripts/check-maintainability.sh

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  clippy-strict:
    name: Clippy (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - run: cargo clippy --workspace --lib --bins --examples -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

  clippy-pedantic:
    name: Clippy (pedantic — advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - name: Run pedantic audit (non-blocking)
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings -W clippy::pedantic || {
            echo "::warning::Pedantic lint debt detected (non-blocking advisory job)."
          }

  rust-test:
    name: Tests (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            cache_key: linux-test
          - os: macos-latest
            name: macOS arm64
            cache_key: macos-test
          - os: macos-15-intel
            name: macOS x64
            cache_key: macos-intel-test
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.cache_key }}
      - run: cargo test --workspace

  windows-smoke:
    name: Windows test build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-test-build
      - run: cargo test --workspace --no-run

  rust-artifacts:
    name: Artifacts (${{ matrix.name }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            cache_key: linux-artifacts
            release_asset: horizon-linux-x64.tar.gz
            binary_path: target/release/horizon
            asset_kind: tar
          - os: macos-latest
            name: macOS arm64
            cache_key: macos-artifacts
            release_asset: horizon-osx-arm64.tar.gz
            binary_path: target/release/horizon
            asset_kind: tar
          - os: macos-15-intel
            name: macOS x64
            cache_key: macos-intel-artifacts
            release_asset: horizon-osx-x64.tar.gz
            binary_path: target/release/horizon
            asset_kind: tar
          - os: windows-latest
            name: Windows x64
            cache_key: windows-artifacts
            release_asset: horizon-windows-x64.exe
            binary_path: target/release/horizon.exe
            asset_kind: file
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.cache_key }}
      - run: cargo build --release
      - name: Package release asset
        shell: bash
        run: |
          case "${{ matrix.asset_kind }}" in
            tar)
              chmod +x "${{ matrix.binary_path }}"
              tar czf "${{ matrix.release_asset }}" \
                -C "$(dirname "${{ matrix.binary_path }}")" \
                "$(basename "${{ matrix.binary_path }}")"
              ;;
            file)
              cp "${{ matrix.binary_path }}" "${{ matrix.release_asset }}"
              ;;
            *)
              echo "Unsupported asset kind: ${{ matrix.asset_kind }}"
              exit 1
              ;;
          esac
      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.release_asset }}
          path: ${{ matrix.release_asset }}

  cargo-publish:
    name: Publish Cargo (crates.io)
    runs-on: ubuntu-latest
    needs: [version, clippy, clippy-strict, rust-test, rust-artifacts]
    if: >-
      github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/heads/release/') ||
        startsWith(github.ref, 'refs/tags/v')
      )
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: Swatinem/rust-cache@v2
      - name: Validate crates.io API token
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN secret is required for crates.io publish."
            exit 1
          fi
      - name: Set version
        run: |
          VERSION="${{ needs.version.outputs.semver }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          sed -i "s/version = \"0\.1\.0\"/version = \"${VERSION}\"/" crates/horizon-ui/Cargo.toml
          cargo generate-lockfile
      - name: Publish horizon-core to crates.io
        run: cargo publish -p horizon-core --allow-dirty
      - name: Publish horizon-ui to crates.io
        run: |
          for attempt in $(seq 1 10); do
            if cargo publish -p horizon-ui --allow-dirty; then
              exit 0
            fi
            if [ "${attempt}" -eq 10 ]; then
              echo "Failed to publish horizon-ui after waiting for horizon-core to sync on crates.io."
              exit 1
            fi
            sleep $((attempt * 5))
          done

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - version
      - maintainability
      - clippy
      - clippy-strict
      - rust-test
      - windows-smoke
      - rust-artifacts
    if: >-
      github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/heads/release/') ||
        startsWith(github.ref, 'refs/tags/v')
      )
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -maxdepth 2 -type f -exec cp {} release-assets/ \;

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.semver }}
          name: v${{ needs.version.outputs.semver }}
          draft: ${{ needs.version.outputs.prerelease == '' }}
          prerelease: ${{ needs.version.outputs.prerelease != '' }}
          generate_release_notes: true
          files: |
            release-assets/horizon-linux-x64.tar.gz
            release-assets/horizon-osx-x64.tar.gz
            release-assets/horizon-osx-arm64.tar.gz
            release-assets/horizon-windows-x64.exe
