name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.gitversion.outputs.semVer }}
      major: ${{ steps.gitversion.outputs.major }}
      minor: ${{ steps.gitversion.outputs.minor }}
      patch: ${{ steps.gitversion.outputs.patch }}
      prerelease: ${{ steps.gitversion.outputs.preReleaseLabel }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify GitVersion and Cargo baseline versions are aligned
        run: ./scripts/check-version-sync.sh
      - uses: gittools/actions/gitversion/setup@v4.4.1
        with:
          versionSpec: '6.x'
      - id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.1

  fmt:
    name: Format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add rustfmt
      - run: cargo fmt --all -- --check

  maintainability:
    name: Maintainability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: ./scripts/check-maintainability.sh

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  clippy-strict:
    name: Clippy (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - run: cargo clippy --workspace --lib --bins --examples -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

  clippy-pedantic:
    name: Clippy (pedantic — advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - name: Run pedantic audit (non-blocking)
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings -W clippy::pedantic || {
            echo "::warning::Pedantic lint debt detected (non-blocking advisory job)."
          }

  rust-test:
    name: Tests (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            cache_key: linux-test
          - os: macos-latest
            name: macOS
            cache_key: macos-test
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.cache_key }}
      - run: cargo test --workspace

  rust-artifacts:
    name: Artifacts (${{ matrix.name }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            cache_key: linux-artifacts
            artifact_name: linux-x64
            artifact_path: target/release/horizon
          - os: macos-latest
            name: macOS
            cache_key: macos-artifacts
            artifact_name: osx-x64
            artifact_path: target/release/horizon
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.cache_key }}
      - run: cargo build --release
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  # ── Publishing (not yet enabled) ────────────────────────────────────
