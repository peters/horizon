next-version: 0.1.0
mode: ContinuousDeployment
branches:
  main:
    regex: ^main$
    increment: Minor
    label: alpha
    prevent-increment:
      when-current-commit-tagged: true
  release:
    regex: ^release/.*$
    increment: Patch
    label: beta
    prevent-increment:
      when-current-commit-tagged: true
