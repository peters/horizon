next-version: 0.1.0
mode: ContinuousDelivery
branches:
  main:
    regex: ^main$
    mode: ContinuousDelivery
    increment: Minor
    label: alpha
    prevent-increment:
      when-current-commit-tagged: true
  release:
    regex: ^release/.*$
    mode: ContinuousDelivery
    increment: Patch
    label: beta
    prevent-increment:
      when-current-commit-tagged: true
